<style>
 *{box-sizing:border-box;margin:0}html,body{height:100%}
 body{background:#FBFCFD;color:#16202E;font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
 .gate{text-align:center;max-width:340px;padding:40px 28px;width:100%}
 .mark{width:15px;height:15px;transform:rotate(45deg);background:linear-gradient(135deg,#0E9A6B,#B7791F);border-radius:3px;margin:0 auto 22px}
 .gate h1{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:1.55rem;letter-spacing:-0.02em;margin-bottom:6px}
 .gate p{color:#5B6B7E;font-size:0.9rem;margin-bottom:24px}
 .gate input{width:100%;padding:13px 16px;border:1px solid #d6dde4;border-radius:10px;font-size:1rem;text-align:center;letter-spacing:0.12em;outline:none;transition:border-color .2s;color:#16202E}
 .gate input:focus{border-color:#0E9A6B}
 .gate button{width:100%;margin-top:12px;padding:13px;border:0;border-radius:10px;background:#0E9A6B;color:#fff;font-size:0.95rem;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s}
 .gate button:hover{background:#0c8a5f}
 .err{color:#D64A3F;font-size:0.8rem;margin-top:12px;min-height:1.1em;opacity:0;transition:opacity .2s}
 .err.show{opacity:1}
 iframe{position:fixed;inset:0;width:100%;height:100%;border:0}
</style></head>

</div>

const u8=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pw){
  const bk=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:u8(P.salt),iterations:P.iter,hash:'SHA-256'},bk,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:u8(P.iv)},key,u8(P.ct));
  return new TextDecoder().decode(pt);
}
document.getElementById('f').addEventListener('submit',async function(e){
  e.preventDefault();
  const err=document.getElementById('err');err.classList.remove('show');
  try{
    const doc=await unlock(document.getElementById('pw').value);
    const f=document.createElement('iframe');
    f.src=URL.createObjectURL(new Blob([doc],{type:'text/html'}));
    f.onload=function(){try{f.contentWindow.focus()}catch(_){}};
    document.body.innerHTML='';document.body.appendChild(f);f.focus();
  }catch(_){err.classList.add('show');document.getElementById('pw').value='';document.getElementById('pw').focus();}
});
</script></body></html>
